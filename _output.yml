bookdown::bs4_book:
  css: style.css
  theme:
    primary: "#1a5e3a"
  repo:
    base: https://github.com/gajsivandran/Environmental_Calculus
    branch: main
    subdir: ""
  includes:
    in_header: _accessibility-head.html
bookdown::gitbook:
  css: style.css
  config:
    toc:
      before: |
        <li><a href="./">QSCI 291</a></li>
      after: |
        <li><a href="https://github.com/gajsivandran/Environmental_Calculus" target="_blank">Published with bookdown</a></li>
    download: ["pdf", "epub"]
bookdown::pdf_book:
  includes:
    in_header: preamble.tex
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: yes
bookdown::epub_book: default
